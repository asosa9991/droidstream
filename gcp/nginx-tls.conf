# TLS termination in front of the control plane.
#
# WebCodecs (VideoDecoder) is restricted to "secure contexts" -- HTTPS or
# localhost -- by spec. The control plane itself only speaks plain HTTP
# (control-plane/src/index.js uses http.createServer with no TLS option),
# so without this, every browser -- including fully WebCodecs-capable
# Chrome -- refuses to expose window.VideoDecoder at all on
# http://<external-ip>:8080, and the app's own capability check
# (web/app.js: `if (!('VideoDecoder' in window))`) fails immediately.
# A self-signed cert is enough: secure-context status depends on the
# scheme, not on whether the browser trusts the certificate.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/key.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
